apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eugene-disallow-privileged
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-privileged-containers
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["eugene-ai"]
      validate:
        message: "Privileged containers are not allowed for Eugene-AI workloads."
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"
