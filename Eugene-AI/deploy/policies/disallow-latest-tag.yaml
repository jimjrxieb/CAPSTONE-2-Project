apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eugene-disallow-latest-tag
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-latest
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["eugene-ai"]
      validate:
        message: "Images must be versioned; the latest tag is not allowed."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
