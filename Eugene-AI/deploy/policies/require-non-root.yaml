apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eugene-require-non-root
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["eugene-ai"]
      validate:
        message: "Eugene-AI workloads must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
