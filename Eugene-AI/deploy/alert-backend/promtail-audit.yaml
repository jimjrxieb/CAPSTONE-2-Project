apiVersion: v1
kind: ConfigMap
metadata:
  name: eugene-audit-promtail
  namespace: siem
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.siem.svc:3100/loki/api/v1/push
        tenant_id: eugene
    scrape_configs:
      - job_name: eugene-audit
        static_configs:
          - targets:
              - localhost
            labels:
              job: eugene-audit
              source: eugene-audit
              __path__: /audit/audit-log.jsonl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eugene-audit-promtail
  namespace: siem
  labels:
    app: eugene-audit-promtail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eugene-audit-promtail
  template:
    metadata:
      labels:
        app: eugene-audit-promtail
    spec:
      automountServiceAccountToken: false
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: audit-log
              mountPath: /audit
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: eugene-audit-promtail
        - name: audit-log
          hostPath:
            path: /tmp/eugene-audit-log
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
