apiVersion: v1
kind: Pod
metadata:
  name: probe
  namespace: eugene-ai
  labels:
    app: alert-backend-smoke-probe
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: probe
      image: curlimages/curl:8.8.0
      command:
        - sh
        - -c
        - curl -sS --connect-timeout 3 --max-time 5 http://10.96.17.163:8001/api/v1/heartbeat || true
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
