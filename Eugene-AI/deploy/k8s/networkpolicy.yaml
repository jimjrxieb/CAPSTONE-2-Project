apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eugene-api-default-deny
  namespace: eugene-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eugene-api-allow-required
  namespace: eugene-ai
spec:
  podSelector:
    matchLabels:
      app: eugene-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: eugene-ai
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: eugene-ai
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 11434
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chromadb-allow-api-only
  namespace: eugene-ai
spec:
  podSelector:
    matchLabels:
      app: chromadb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: eugene-api
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
