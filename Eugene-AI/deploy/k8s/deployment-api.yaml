apiVersion: apps/v1
kind: Deployment
metadata:
  name: eugene-api
  namespace: eugene-ai
  labels:
    app: eugene-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eugene-api
  template:
    metadata:
      labels:
        app: eugene-api
    spec:
      serviceAccountName: eugene-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: eugene-ai:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: eugene-ai-config
            - secretRef:
                name: eugene-ai-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: evidence
              mountPath: /app/evidence
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: evidence
          emptyDir: {}
        - name: tmp
          emptyDir: {}
