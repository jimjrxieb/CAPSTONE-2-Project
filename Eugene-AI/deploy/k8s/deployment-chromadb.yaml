apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: eugene-ai
  labels:
    app: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.3
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args:
            - "chromadb.app:app"
            - "--workers"
            - "1"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--proxy-headers"
            - "--timeout-keep-alive"
            - "30"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CHROMA_SERVER_AUTHN_PROVIDER
              value: chromadb.auth.token_authn.TokenAuthenticationServerProvider
            - name: CHROMA_SERVER_AUTHN_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: eugene-ai-secrets
                  key: CHROMA_AUTH_TOKEN
            - name: CHROMA_AUTH_TOKEN_TRANSPORT_HEADER
              value: Authorization
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          emptyDir: {}
